name: Model Training Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/pipelines/train.py'
      - 'src/components/**'
      - 'config/**'
  workflow_dispatch:
    inputs:
      experiment_name:
        description: 'MLflow experiment name'
        required: false
        default: 'CreditCard_Fraud_Detection'

jobs:
  train:
    name: Train and Evaluate Model
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Set up Azure ML CLI
        run: |
          pip install azure-cli
          az extension add -n ml
      
      - name: Configure Azure ML workspace
        env:
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}
        run: |
          az account set --subscription $SUBSCRIPTION_ID
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME
      
      - name: Step 1: Data Preparation
        run: python -m src.pipelines.data_prep --input-datastore-path "UI/2026-04-04_090211_UTC/creditcard_train.csv" --local-data-dir "./data" --output-dir "./outputs/prepared_data"
      
      - name: Step 2: Model Training
        run: python -m src.pipelines.train --prepared-data-dir "./outputs/prepared_data" --output-dir "./outputs" --mlflow-experiment "${{ github.event.inputs.experiment_name || 'CreditCard_Fraud_Detection' }}"
      
      - name: Step 3: Model Evaluation
        run: python -m src.pipelines.evaluate --model-path "./outputs/model.pkl" --test-data-dir "./outputs" --output-dir "./outputs" --thresholds-config "./config/thresholds.yaml"
      
      - name: Step 4: Champion/Challenger Selection
        run: python -m src.pipelines.champion_challenger --model-path "./outputs/model.pkl" --metrics-path "./outputs/metrics.json" --model-name "CreditCard_Fraud_Detection" --output-dir "./outputs"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: model-training-artifacts
          path: |
            outputs/
            logs/
      
      - name: Comment on PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./outputs/training_result.json', 'utf8'));
            const evaluation = JSON.parse(fs.readFileSync('./outputs/evaluation_report.json', 'utf8'));
            
            let comment = '## 🤖 Model Training Results\n\n';
            comment += '### Metrics\n';
            Object.entries(results.metrics).forEach(([key, value]) => {
              comment += '- **' + key + '**: ' + value.toFixed(4) + '\n';
            });
            
            comment += '\n### Governance Gates\n';
            Object.entries(evaluation.governance_gates).forEach(([key, value]) => {
              const status = value ? '✅' : '❌';
              comment += '- ' + status + ' ' + key + '\n';
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Model training pipeline completed successfully!"
          echo "Check outputs/ directory for artifacts and evaluation_report.json for governance gates."
      
      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Model training pipeline failed!"
          echo "Check logs/ directory for detailed error information."
